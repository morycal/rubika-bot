<!DOCTYPE html>
<html>
<head>
    <title>CRM Dashboard</title>
</head>
<body>

<h2>📊 CRM بیمه</h2>

<p>کل سفارش‌ها: {{total}}</p>
<p>جدید: {{new}}</p>
<p>انجام شده: {{done}}</p>

<hr>

<table border="1">
<tr>
    <th>ID</th>
    <th>User</th>
    <th>Text</th>
    <th>Status</th>
    <th>Actions</th>
</tr>

{% for o in orders %}
<tr>
    <td>{{o[0]}}</td>
    <td>{{o[1]}}</td>
    <td>{{o[5]}}</td>
    <td>{{o[6]}}</td>
    <td>
        <a href="/update/{{o[0]}}/CONTACTED">📞 تماس گرفته شد</a>
        <a href="/update/{{o[0]}}/DONE">✅ انجام شد</a>
    </td>
</tr>
{% endfor %}

</table>

</body>
</html>

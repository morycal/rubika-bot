<h2>📊 CRM Dashboard</h2>

<p>🆕 New Orders: {{new}}</p>
<p>📦 Total: {{total}}</p>

<hr>

<table border="1">
<tr>
<th>ID</th>
<th>User</th>
<th>Text</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for o in orders %}
<tr>
<td>{{o[0]}}</td>
<td>{{o[1]}}</td>
<td>{{o[2]}}</td>
<td>{{o[3]}}</td>
<td>
<a href="/update/{{o[0]}}/CONTACTED">📞</a>
<a href="/update/{{o[0]}}/DONE">✅</a>
</td>
</tr>
{% endfor %}

</table>
